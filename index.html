<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja João 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00ff00; z-index: 10; pointer-events: none; }
        
        /* Controles de Toque */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: grid;
            grid-template-columns: 60px 60px 60px;
            gap: 10px;
            z-index: 20;
        }
        .btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            user-select: none;
        }
        #btn-up { grid-column: 2; }
        #btn-left { grid-column: 1; }
        #btn-down { grid-column: 2; }
        #btn-right { grid-column: 3; }
        #btn-attack {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>Objetos: <span id="score">0</span></div>
        <div>Tempo: <span id="timer">0s</span></div>
    </div>

    <div id="controls">
        <div class="btn" id="btn-up">W</div>
        <div class="btn" id="btn-left">A</div>
        <div class="btn" id="btn-down">S</div>
        <div class="btn" id="btn-right">D</div>
    </div>
    <div class="btn" id="btn-attack">ATACAR</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="game.js?v=3"></script>
</body>
</html>

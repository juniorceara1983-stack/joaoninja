<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninja João 3D</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        
        /* Interface (HUD) */
        #ui { position: absolute; top: 10px; left: 10px; color: #00ff00; z-index: 10; pointer-events: none; font-size: 1rem; line-height: 1.6; text-shadow: 0 0 6px #00ff00; background: rgba(0,0,0,0.45); padding: 6px 10px; border-radius: 6px; }
        
        /* Overlay de mensagens */
        #msg-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            color: #fff; font-size: 2rem; font-weight: bold;
            justify-content: center; align-items: center; text-align: center;
            z-index: 100; padding: 20px; box-sizing: border-box;
            text-shadow: 0 0 12px #00ffaa;
        }
        #msg-overlay.visible { display: flex; }
        
        /* Controles de Movimento (Esquerda) */
        #controls { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: 60px 60px 60px; gap: 10px; z-index: 20; }
        .btn { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2); border: 2px solid white; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; user-select: none; }
        #btn-up { grid-column: 2; } #btn-left { grid-column: 1; } #btn-down { grid-column: 2; } #btn-right { grid-column: 3; }
        
        /* Controles de Ação (Direita) */
        #actions { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 15px; z-index: 20; }
        .action-btn { width: 70px; height: 70px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; user-select: none; }
        #btn-sword { background: rgba(255, 0, 0, 0.4); border: 2px solid #ff4444; }
        #btn-shuriken { background: rgba(0, 0, 255, 0.4); border: 2px solid #4444ff; }
    </style>
</head>
<body>
    <div id="ui">
        <div>Nível: <span id="nivel">1/10</span></div>
        <div>Objetos: <span id="score">0/0</span></div>
        <div>Tempo: <span id="timer">0s</span></div>
    </div>

    <div id="msg-overlay"></div>

    <div id="controls">
        <div class="btn" id="btn-up">W</div>
        <div class="btn" id="btn-left">A</div>
        <div class="btn" id="btn-down">S</div>
        <div class="btn" id="btn-right">D</div>
    </div>

    <div id="actions">
        <div class="action-btn" id="btn-sword">ESPADA<br>(Espaço)</div>
        <div class="action-btn" id="btn-shuriken">SHURIKEN<br>(Click)</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="game.js?v=7"></script>
</body>
</html>
